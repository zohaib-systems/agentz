<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AgentZ — Personal Concierge</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.development.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.development.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
  <link
    href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap"
    rel="stylesheet" />
  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --bg: #0a1628;
      --surface: #0f2040;
      --card: #132952;
      --border: #1e3a6e;
      --blue: #3b82f6;
      --blue-dim: #1d4ed8;
      --gold: #f59e0b;
      --green: #10b981;
      --red: #ef4444;
      --yellow: #f59e0b;
      --gray: #64748b;
      --text: #e2e8f0;
      --muted: #94a3b8;
      --font: 'Space Grotesk', sans-serif;
      --mono: 'JetBrains Mono', monospace;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font);
      min-height: 100vh;
      overflow-x: hidden;
    }

    ::-webkit-scrollbar {
      width: 6px;
    }

    ::-webkit-scrollbar-track {
      background: var(--bg);
    }

    ::-webkit-scrollbar-thumb {
      background: var(--border);
      border-radius: 3px;
    }

    .header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 0 24px;
      height: 64px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .header-left {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .logo {
      font-size: 20px;
      font-weight: 700;
      color: var(--blue);
      letter-spacing: -0.5px;
    }

    .logo span {
      color: var(--gold);
    }

    .header-greeting {
      font-size: 13px;
      color: var(--muted);
    }

    .header-stats {
      display: flex;
      gap: 24px;
    }

    .stat-chip {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
    }

    .stat-chip .val {
      font-size: 18px;
      font-weight: 700;
      color: var(--blue);
      font-family: var(--mono);
      line-height: 1;
    }

    .stat-chip .lbl {
      font-size: 10px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .nav {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      display: flex;
      gap: 0;
      padding: 0 24px;
      overflow-x: auto;
    }

    .nav-tab {
      padding: 12px 20px;
      font-size: 13px;
      font-weight: 500;
      color: var(--muted);
      cursor: pointer;
      border-bottom: 2px solid transparent;
      white-space: nowrap;
      transition: all 0.15s;
      background: none;
      border-left: none;
      border-right: none;
      border-top: none;
    }

    .nav-tab:hover {
      color: var(--text);
    }

    .nav-tab.active {
      color: var(--blue);
      border-bottom-color: var(--blue);
    }

    .main {
      padding: 24px;
      max-width: 1400px;
      margin: 0 auto;
    }

    .panel {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      overflow: hidden;
    }

    .panel-header {
      padding: 16px 20px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .panel-title {
      font-size: 13px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--muted);
    }

    .panel-body {
      padding: 20px;
    }

    .btn {
      padding: 8px 16px;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      border: none;
      font-family: var(--font);
      transition: all 0.15s;
    }

    .btn-primary {
      background: var(--blue);
      color: white;
    }

    .btn-primary:hover {
      background: var(--blue-dim);
    }

    .btn-ghost {
      background: var(--card);
      color: var(--text);
      border: 1px solid var(--border);
    }

    .btn-ghost:hover {
      border-color: var(--blue);
      color: var(--blue);
    }

    .btn-sm {
      padding: 5px 10px;
      font-size: 12px;
    }

    .btn-green {
      background: var(--green);
      color: white;
    }

    .btn-green:hover {
      opacity: 0.85;
    }

    .btn-red {
      background: #7f1d1d;
      color: #fca5a5;
      border: 1px solid var(--red);
    }

    .btn-gold {
      background: var(--gold);
      color: #1a1a1a;
    }

    .score-badge {
      display: inline-flex;
      align-items: center;
      padding: 3px 10px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 700;
      font-family: var(--mono);
    }

    .score-high {
      background: #064e3b;
      color: #6ee7b7;
    }

    .score-mid {
      background: #451a03;
      color: #fcd34d;
    }

    .score-low {
      background: #450a0a;
      color: #fca5a5;
    }

    .job-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 16px;
      margin-bottom: 10px;
      transition: border-color 0.15s;
    }

    .job-card:hover {
      border-color: var(--blue);
    }

    .job-card-top {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 8px;
    }

    .job-title {
      font-size: 14px;
      font-weight: 600;
      color: var(--text);
    }

    .job-company {
      font-size: 12px;
      color: var(--muted);
      margin-top: 2px;
    }

    .job-skills {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin: 10px 0;
    }

    .skill-chip {
      background: #1e3a6e;
      color: #93c5fd;
      font-size: 11px;
      padding: 2px 8px;
      border-radius: 4px;
      font-family: var(--mono);
    }

    .job-actions {
      display: flex;
      gap: 8px;
      margin-top: 12px;
    }

    .filter-tabs {
      display: flex;
      gap: 8px;
      margin-bottom: 16px;
    }

    .filter-tab {
      padding: 5px 14px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 500;
      cursor: pointer;
      border: 1px solid var(--border);
      background: none;
      color: var(--muted);
      font-family: var(--font);
      transition: all 0.15s;
    }

    .filter-tab.active {
      background: var(--blue);
      color: white;
      border-color: var(--blue);
    }

    .chat-messages {
      height: 320px;
      overflow-y: auto;
      padding: 12px;
      background: var(--card);
      border-radius: 8px;
      margin-bottom: 12px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .chat-bubble {
      max-width: 85%;
      padding: 10px 14px;
      border-radius: 10px;
      font-size: 13px;
      line-height: 1.5;
    }

    .chat-bubble.user {
      background: var(--blue-dim);
      color: white;
      align-self: flex-end;
      border-bottom-right-radius: 2px;
    }

    .chat-bubble.agent {
      background: var(--surface);
      border: 1px solid var(--border);
      align-self: flex-start;
      border-bottom-left-radius: 2px;
      white-space: pre-wrap;
    }

    .chat-agent-label {
      font-size: 10px;
      color: var(--blue);
      font-weight: 600;
      margin-bottom: 4px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .chat-input-row {
      display: flex;
      gap: 8px;
    }

    .chat-input {
      flex: 1;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 13px;
      color: var(--text);
      font-family: var(--font);
      outline: none;
      transition: border-color 0.15s;
    }

    .chat-input:focus {
      border-color: var(--blue);
    }

    .chat-input::placeholder {
      color: var(--gray);
    }

    .email-chip {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 500;
      margin: 4px;
    }

    .chip-CLIENT {
      background: #1e3a6e;
      color: #93c5fd;
    }

    .chip-PAYMENT {
      background: #064e3b;
      color: #6ee7b7;
    }

    .chip-OPPORTUNITY {
      background: #451a03;
      color: #fcd34d;
    }

    .chip-IGNORE {
      background: #1e293b;
      color: #64748b;
    }

    .briefing-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    .briefing-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 16px;
    }

    .briefing-card .icon {
      font-size: 22px;
      margin-bottom: 6px;
    }

    .briefing-card .label {
      font-size: 10px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 4px;
    }

    .briefing-card .value {
      font-size: 14px;
      font-weight: 600;
      color: var(--text);
    }

    .textarea {
      width: 100%;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 12px;
      font-size: 13px;
      color: var(--text);
      font-family: var(--mono);
      outline: none;
      resize: vertical;
      min-height: 100px;
      transition: border-color 0.15s;
    }

    .textarea:focus {
      border-color: var(--blue);
    }

    .textarea::placeholder {
      color: var(--gray);
    }

    .empty {
      text-align: center;
      padding: 40px 20px;
      color: var(--muted);
      font-size: 13px;
    }

    .empty .icon {
      font-size: 32px;
      margin-bottom: 8px;
    }

    .loading {
      display: inline-flex;
      gap: 4px;
      align-items: center;
    }

    .dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--blue);
      animation: pulse 1.2s ease-in-out infinite;
    }

    .dot:nth-child(2) {
      animation-delay: 0.2s;
    }

    .dot:nth-child(3) {
      animation-delay: 0.4s;
    }

    @keyframes pulse {

      0%,
      100% {
        opacity: 0.3;
        transform: scale(0.8)
      }

      50% {
        opacity: 1;
        transform: scale(1)
      }
    }

    .proposal-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 16px;
      margin-bottom: 10px;
    }

    .proposal-card.approved {
      border-color: var(--green);
    }

    .proposal-text {
      font-size: 13px;
      color: var(--text);
      line-height: 1.6;
      white-space: pre-wrap;
      max-height: 160px;
      overflow-y: auto;
      margin: 10px 0;
      padding: 10px;
      background: var(--surface);
      border-radius: 6px;
      font-family: var(--mono);
    }

    .status-pill {
      font-size: 11px;
      padding: 2px 8px;
      border-radius: 20px;
      font-weight: 600;
    }

    .status-pending {
      background: #451a03;
      color: #fcd34d;
    }

    .status-approved {
      background: #064e3b;
      color: #6ee7b7;
    }

    .grid-2 {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
    }

    @media (max-width: 640px) {
      .grid-2 {
        grid-template-columns: 1fr;
      }
    }

    .toast {
      position: fixed;
      bottom: 24px;
      right: 24px;
      background: var(--card);
      border: 1px solid var(--blue);
      color: var(--text);
      padding: 12px 20px;
      border-radius: 10px;
      font-size: 13px;
      z-index: 999;
      animation: slideIn 0.2s ease;
    }

    @keyframes slideIn {
      from {
        transform: translateY(20px);
        opacity: 0
      }

      to {
        transform: translateY(0);
        opacity: 1
      }
    }

    .divider {
      border: none;
      border-top: 1px solid var(--border);
      margin: 16px 0;
    }

    /* Focus Mode */
    .focus-overlay {
      position: fixed;
      inset: 0;
      background: var(--bg);
      z-index: 200;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    .focus-title {
      font-size: 28px;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 8px;
      text-align: center;
      max-width: 600px;
    }

    .focus-mode-label {
      font-size: 12px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 2px;
      margin-bottom: 32px;
    }

    .focus-mode-label.work {
      color: var(--blue);
    }

    .focus-mode-label.break {
      color: var(--green);
    }

    .focus-timer {
      font-size: 80px;
      font-weight: 700;
      font-family: var(--mono);
      color: var(--text);
      line-height: 1;
      margin-bottom: 24px;
    }

    .focus-timer.break {
      color: var(--green);
    }

    .focus-progress-wrap {
      width: 320px;
      height: 6px;
      background: var(--border);
      border-radius: 3px;
      margin-bottom: 32px;
      overflow: hidden;
    }

    .focus-progress-bar {
      height: 100%;
      border-radius: 3px;
      transition: width 1s linear;
    }

    .focus-progress-bar.work {
      background: var(--blue);
    }

    .focus-progress-bar.break {
      background: var(--green);
    }

    .focus-pomodoros {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 32px;
    }

    .pomo-dot {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: var(--border);
    }

    .pomo-dot.done {
      background: var(--gold);
    }

    .focus-actions {
      display: flex;
      gap: 12px;
    }

    .focus-summary {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 32px;
      text-align: center;
      max-width: 400px;
    }

    .focus-summary h2 {
      font-size: 24px;
      font-weight: 700;
      margin-bottom: 24px;
      color: var(--gold);
    }

    .focus-summary-grid {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 16px;
      margin-bottom: 24px;
    }

    .focus-stat {
      background: var(--card);
      border-radius: 10px;
      padding: 16px;
    }

    .focus-stat .val {
      font-size: 24px;
      font-weight: 700;
      font-family: var(--mono);
      color: var(--blue);
    }

    .focus-stat .lbl {
      font-size: 11px;
      color: var(--muted);
      margin-top: 4px;
    }

    .focus-setup {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 32px;
      max-width: 480px;
      width: 100%;
    }

    .focus-setup h2 {
      font-size: 22px;
      font-weight: 700;
      margin-bottom: 8px;
      color: var(--text);
    }

    .focus-setup p {
      font-size: 13px;
      color: var(--muted);
      margin-bottom: 24px;
    }

    .focus-input {
      width: 100%;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 12px 16px;
      font-size: 15px;
      color: var(--text);
      font-family: var(--font);
      outline: none;
      margin-bottom: 16px;
    }

    .focus-input:focus {
      border-color: var(--blue);
    }

    .focus-duration-row {
      display: flex;
      gap: 8px;
      margin-bottom: 24px;
    }

    .duration-chip {
      flex: 1;
      padding: 8px;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: var(--card);
      color: var(--muted);
      font-size: 13px;
      font-family: var(--font);
      cursor: pointer;
      text-align: center;
      transition: all 0.15s;
    }

    .duration-chip.active {
      border-color: var(--blue);
      color: var(--blue);
      background: #1e3a6e;
    }

    /* Focus active indicator in nav */
    .nav-tab.focus-active {
      color: var(--gold) !important;
      border-bottom-color: var(--gold) !important;
    }
  </style>
</head>

<body>
  <div id="root"></div>
  <script type="text/babel">
    const ADK_BASE = "http://127.0.0.1:8000";
    const USER_ID = "zohaib";
    const SESSION_ID = "dashboard-" + Date.now();

    function ScoreBadge({ score }) {
      const cls = score >= 70 ? "score-high" : score >= 50 ? "score-mid" : "score-low";
      return <span className={"score-badge " + cls}>{score}/100</span>;
    }
    function Loading() {
      return <span className="loading"><span className="dot" /><span className="dot" /><span className="dot" /></span>;
    }
    function Toast({ msg, onClose }) {
      React.useEffect(() => { const t = setTimeout(onClose, 3000); return () => clearTimeout(t); }, []);
      return <div className="toast">✓ {msg}</div>;
    }
    async function callAgent(message) {
      await fetch(`${ADK_BASE}/apps/app/users/${USER_ID}/sessions/${SESSION_ID}`, {
        method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify({}),
      }).catch(() => { });
      const res = await fetch(`${ADK_BASE}/run`, {
        method: "POST", headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          app_name: "app", user_id: USER_ID, session_id: SESSION_ID,
          new_message: { role: "user", parts: [{ text: message }] }
        }),
      });
      const data = await res.json();
      if (Array.isArray(data)) {
        const modelEvents = data.filter(e => e.content?.parts && e.content?.role === "model");
        if (modelEvents.length > 0) {
          const last = modelEvents[modelEvents.length - 1];
          return last.content.parts.map(p => p.text || "").join("");
        }
        const last = data[data.length - 1];
        if (last?.content?.parts) return last.content.parts.map(p => p.text || "").join("");
      }
      if (data.detail) return "⚠️ " + data.detail;
      if (data.text) return data.text;
      return JSON.stringify(data);
    }

    // ── Focus Mode ────────────────────────────────────────────────────────────────
    function FocusMode({ focusState, setFocusState, setTab }) {
      const WORK_DURATIONS = [25, 45, 90];
      const BREAK_DURATION = 5;

      // Persistent state (survives tab switches)
      const phase = focusState.phase;
      const topic = focusState.topic;
      const workMins = focusState.workMins;
      const pomodoros = focusState.pomodoros;
      const totalFocused = focusState.totalFocused;

      function setPhase(v) { setFocusState(s => ({ ...s, phase: v })); }
      function setTopic(v) { setFocusState(s => ({ ...s, topic: v })); }
      function setWorkMins(v) { setFocusState(s => ({ ...s, workMins: v })); }
      function incPomodoros() { setFocusState(s => ({ ...s, pomodoros: s.pomodoros + 1, totalFocused: s.totalFocused + s.workMins })); }

      // Local timer state (resets on tab switch — acceptable)
      const [secondsLeft, setSecondsLeft] = React.useState(workMins * 60);
      const [totalSeconds, setTotalSeconds] = React.useState(workMins * 60);
      const intervalRef = React.useRef(null);

      // Sync timer when returning to tab
      React.useEffect(() => {
        if (phase === "setup" || phase === "done") {
          setSecondsLeft(workMins * 60);
          setTotalSeconds(workMins * 60);
        }
      }, [phase, workMins]);

      function startWork() {
        if (!topic.trim()) return;
        const secs = workMins * 60;
        setSecondsLeft(secs);
        setTotalSeconds(secs);
        setPhase("work");
      }

      function startBreak() {
        const secs = BREAK_DURATION * 60;
        setSecondsLeft(secs);
        setTotalSeconds(secs);
        setPhase("break");
      }

      function endSession() {
        clearInterval(intervalRef.current);
        setPhase("done");
      }

      function reset() {
        clearInterval(intervalRef.current);
        setFocusState({ phase: "setup", topic: "", workMins: 25, pomodoros: 0, totalFocused: 0 });
        setSecondsLeft(25 * 60);
        setTotalSeconds(25 * 60);
      }

      React.useEffect(() => {
        if (phase !== "work" && phase !== "break") return;
        intervalRef.current = setInterval(() => {
          setSecondsLeft(s => {
            if (s <= 1) {
              clearInterval(intervalRef.current);
              if (phase === "work") {
                incPomodoros();
                startBreak();
              } else {
                const secs = workMins * 60;
                setSecondsLeft(secs);
                setTotalSeconds(secs);
                setPhase("work");
              }
              return 0;
            }
            return s - 1;
          });
        }, 1000);
        return () => clearInterval(intervalRef.current);
      }, [phase]);

      function fmt(s) {
        const m = Math.floor(s / 60);
        const sec = s % 60;
        return `${String(m).padStart(2, "0")}:${String(sec).padStart(2, "0")}`;
      }

      const progress = totalSeconds > 0 ? ((totalSeconds - secondsLeft) / totalSeconds) * 100 : 0;

      if (phase === "setup") return (
        <div style={{ display: "flex", alignItems: "center", justifyContent: "center", minHeight: "60vh" }}>
          <div className="focus-setup">
            <h2>🎯 Start Focus Session</h2>
            <p>Block distractions and enter deep work mode. Pomodoro timer included.</p>
            <input className="focus-input" placeholder="What are you focusing on? e.g. AgentZ capstone, IBM Full Stack Module 3"
              value={topic} onChange={e => setTopic(e.target.value)} onKeyDown={e => e.key === "Enter" && startWork()} />
            <p style={{ fontSize: "12px", color: "var(--muted)", marginBottom: "8px" }}>Session duration:</p>
            <div className="focus-duration-row">
              {WORK_DURATIONS.map(d => (
                <button key={d} className={"duration-chip" + (workMins === d ? " active" : "")}
                  onClick={() => { setWorkMins(d); setSecondsLeft(d * 60); setTotalSeconds(d * 60); }}>
                  {d} min
                </button>
              ))}
            </div>
            <button className="btn btn-primary" style={{ width: "100%", padding: "12px", fontSize: "15px" }}
              onClick={startWork} disabled={!topic.trim()}>
              🚀 Start Focus Session
            </button>
            {pomodoros > 0 && (
              <div style={{ marginTop: "16px", padding: "12px", background: "var(--card)", borderRadius: "8px", fontSize: "13px", color: "var(--muted)" }}>
                Previous session: <strong style={{ color: "var(--gold)" }}>{pomodoros} pomodoros</strong> · <strong style={{ color: "var(--blue)" }}>{totalFocused} min</strong> focused
                <button className="btn btn-ghost btn-sm" style={{ marginLeft: "12px" }} onClick={reset}>Reset</button>
              </div>
            )}
          </div>
        </div>
      );

      if (phase === "done") return (
        <div style={{ display: "flex", alignItems: "center", justifyContent: "center", minHeight: "60vh" }}>
          <div className="focus-summary">
            <h2>✅ Session Complete!</h2>
            <p style={{ fontSize: "13px", color: "var(--muted)", marginBottom: "24px" }}>"{topic}"</p>
            <div className="focus-summary-grid">
              <div className="focus-stat"><div className="val">{totalFocused}</div><div className="lbl">Min Focused</div></div>
              <div className="focus-stat"><div className="val" style={{ color: "var(--gold)" }}>{pomodoros}</div><div className="lbl">Pomodoros</div></div>
              <div className="focus-stat"><div className="val" style={{ color: "var(--green)" }}>+{pomodoros}</div><div className="lbl">Habit +</div></div>
            </div>
            <p style={{ fontSize: "12px", color: "var(--green)", marginBottom: "20px" }}>💪 Deep Work habit updated · Session logged</p>
            <div style={{ display: "flex", gap: "10px" }}>
              <button className="btn btn-primary" style={{ flex: 1 }} onClick={() => setPhase("setup")}>New Session</button>
              <button className="btn btn-ghost" style={{ flex: 1 }} onClick={reset}>Reset All</button>
            </div>
          </div>
        </div>
      );

      return (
        <div className="focus-overlay">
          <div className={"focus-mode-label " + (phase === "work" ? "work" : "break")}>
            {phase === "work" ? "🎯 Deep Work" : "☕ Break Time"}
          </div>
          <div className="focus-title">{topic}</div>
          <div className={"focus-timer" + (phase === "break" ? " break" : "")}>{fmt(secondsLeft)}</div>
          <div className="focus-progress-wrap">
            <div className={"focus-progress-bar " + (phase === "work" ? "work" : "break")} style={{ width: progress + "%" }} />
          </div>
          <div className="focus-pomodoros">
            {[...Array(Math.max(4, pomodoros + 1))].map((_, i) => (
              <div key={i} className={"pomo-dot" + (i < pomodoros ? " done" : "")} />
            ))}
            <span style={{ fontSize: "12px", color: "var(--muted)", marginLeft: "8px" }}>
              {pomodoros} pomodoro{pomodoros !== 1 ? "s" : ""} done
            </span>
          </div>
          <div className="focus-actions">
            {phase === "work" && <button className="btn btn-ghost" onClick={startBreak}>☕ Take Break</button>}
            {phase === "break" && (
              <button className="btn btn-primary" onClick={() => {
                const secs = workMins * 60; setSecondsLeft(secs); setTotalSeconds(secs); setPhase("work");
              }}>▶ Back to Work</button>
            )}
            <button className="btn btn-red" onClick={endSession}>⏹ End Session</button>
          </div>
          <button className="btn btn-ghost" style={{ marginTop: "24px", fontSize: "12px", opacity: 0.6 }}
            onClick={() => setTab("chat")}>
            ← Back to Dashboard (timer keeps running)
          </button>
        </div>
      );
    }

    // ── Opportunities Panel ───────────────────────────────────────────────────────
    function OpportunitiesPanel({ onToast }) {
      const [jobs, setJobs] = React.useState([]);
      const [filter, setFilter] = React.useState("All");
      const [loading, setLoading] = React.useState(false);
      React.useEffect(() => { loadJobs(); }, []);
      async function loadJobs() {
        setLoading(true);
        try {
          const res = await fetch("../dashboard_jobs.json");
          if (res.ok) { const d = await res.json(); setJobs(d); }
        } catch (e) {
          setJobs([
            { job_id: "1", title: "React AI Developer", company: "HealthTech Inc", score: 82, matched_skills: ["React developer", "AI chatbot", "Node.js"], status: "new", location: "Remote" },
            { job_id: "2", title: "MERN Stack Developer", company: "StartupXYZ", score: 65, matched_skills: ["MERN stack", "MongoDB"], status: "new", location: "Remote" },
            { job_id: "3", title: "iOS Native Developer", company: "AppCo", score: 15, matched_skills: [], status: "new", location: "US" },
          ]);
        }
        setLoading(false);
      }
      function updateStatus(id, status) {
        setJobs(prev => prev.map(j => j.job_id === id ? { ...j, status } : j));
        onToast(status === "applied" ? "Marked as applied" : "Job ignored");
      }
      const filtered = jobs.filter(j => {
        if (filter === "High Match") return j.score >= 70;
        if (filter === "New") return j.status === "new";
        return true;
      });
      return (
        <div className="panel">
          <div className="panel-header">
            <span className="panel-title">🎯 Opportunities</span>
            <div style={{ display: "flex", gap: "8px", alignItems: "center" }}>
              <span style={{ fontSize: "12px", color: "var(--muted)" }}>{jobs.length} jobs</span>
              <button className="btn btn-ghost btn-sm" onClick={loadJobs}>Refresh</button>
            </div>
          </div>
          <div className="panel-body">
            <div className="filter-tabs">
              {["All", "High Match", "New"].map(f => (
                <button key={f} className={"filter-tab" + (filter === f ? " active" : "")} onClick={() => setFilter(f)}>{f}</button>
              ))}
            </div>
            {loading ? <div className="empty"><Loading /></div> :
              filtered.length === 0 ? <div className="empty"><div className="icon">📭</div>No jobs found. Start ADK server and click Refresh.</div> :
                filtered.map(job => (
                  <div key={job.job_id} className="job-card">
                    <div className="job-card-top">
                      <div><div className="job-title">{job.title}</div><div className="job-company">{job.company} · {job.location}</div></div>
                      <ScoreBadge score={job.score} />
                    </div>
                    {job.matched_skills?.length > 0 && <div className="job-skills">{job.matched_skills.map(s => <span key={s} className="skill-chip">{s}</span>)}</div>}
                    <div className="job-actions">
                      <button className="btn btn-green btn-sm" onClick={() => updateStatus(job.job_id, "applied")}>✓ Applied</button>
                      <button className="btn btn-ghost btn-sm" onClick={() => updateStatus(job.job_id, "ignored")}>Ignore</button>
                      {job.apply_link && <a href={job.apply_link} target="_blank" rel="noreferrer"><button className="btn btn-ghost btn-sm">Open ↗</button></a>}
                    </div>
                  </div>
                ))}
          </div>
        </div>
      );
    }

    // ── Chat Panel ────────────────────────────────────────────────────────────────
    function ChatPanel({ onProposal, messages, setMessages }) {
      const [input, setInput] = React.useState("");
      const [loading, setLoading] = React.useState(false);
      const bottomRef = React.useRef(null);
      React.useEffect(() => { if (bottomRef.current) bottomRef.current.scrollIntoView({ behavior: "smooth" }); }, [messages]);
      async function send() {
        const text = input.trim();
        if (!text || loading) return;
        setInput("");
        setMessages(prev => [...prev, { role: "user", text }]);
        setLoading(true);
        try {
          const reply = await callAgent(text);
          setMessages(prev => [...prev, { role: "agent", text: reply }]);
          if (reply.includes("PROPOSAL READY FOR REVIEW") || (reply.includes("proposal") && reply.includes("score") && reply.includes("review"))) {
            onProposal({ proposal: reply, status: "pending_review", job_description: text });
          }
        } catch (e) {
          setMessages(prev => [...prev, { role: "agent", text: "⚠️ Could not reach AgentZ. Make sure the ADK server is running at " + ADK_BASE }]);
        }
        setLoading(false);
      }
      function onKey(e) { if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); send(); } }
      return (
        <div className="panel">
          <div className="panel-header">
            <span className="panel-title">💬 Chat with AgentZ</span>
            <span style={{ fontSize: "11px", color: "var(--green)" }}>● Live</span>
          </div>
          <div className="panel-body">
            <div className="chat-messages">
              {messages.map((m, i) => (
                <div key={i} className={"chat-bubble " + m.role}>
                  {m.role === "agent" && <div className="chat-agent-label">AgentZ</div>}
                  {m.text}
                </div>
              ))}
              {loading && <div className="chat-bubble agent"><div className="chat-agent-label">AgentZ</div><Loading /></div>}
              <div ref={bottomRef} />
            </div>
            <div className="chat-input-row">
              <input className="chat-input" value={input} onChange={e => setInput(e.target.value)} onKeyDown={onKey}
                placeholder='Try: "Score this job...", "morning briefing", "schedule meeting tomorrow 3pm"' />
              <button className="btn btn-primary" onClick={send} disabled={loading}>Send</button>
            </div>
          </div>
        </div>
      );
    }

    // ── Email Triage Panel ────────────────────────────────────────────────────────
    function EmailTriagePanel({ onToast }) {
      const [input, setInput] = React.useState("New order received|order@fiverr.com\nPayment of $150|payments@paypal.com\n50% off tools|deals@newsletter.com\nProject update needed|client@healthclinic.com");
      const [results, setResults] = React.useState([]);
      const [loading, setLoading] = React.useState(false);
      async function triage() {
        setLoading(true);
        const emails = input.trim().split("\n").filter(Boolean).join(", ");
        try {
          const reply = await callAgent("Triage these emails: " + emails);
          const match = reply.match(/\[[\s\S]*\]/);
          if (match) { setResults(JSON.parse(match[0])); } else { setResults(localTriage(emails)); }
        } catch (e) { setResults(localTriage(emails)); }
        setLoading(false);
        onToast("Emails triaged");
      }
      function localTriage(emails) {
        return emails.split(", ").map(e => {
          const [subject = "", sender = ""] = e.split("|").map(s => s.trim().toLowerCase());
          let category = "IGNORE", reason = "No match";
          if (["payment", "paid", "invoice", "receipt"].some(w => subject.includes(w))) { category = "PAYMENT"; reason = "Payment related"; }
          else if (["fiverr", "upwork", "linkedin"].some(w => sender.includes(w)) || ["order", "inquiry", "job", "new gig"].some(w => subject.includes(w))) { category = "OPPORTUNITY"; reason = "New opportunity"; }
          else if (["project", "update", "revision", "client"].some(w => subject.includes(w) || sender.includes(w))) { category = "CLIENT"; reason = "Client related"; }
          return { email: e, category, reason };
        });
      }
      const chipClass = { CLIENT: "chip-CLIENT", PAYMENT: "chip-PAYMENT", OPPORTUNITY: "chip-OPPORTUNITY", IGNORE: "chip-IGNORE" };
      return (
        <div className="panel">
          <div className="panel-header"><span className="panel-title">📧 Email Triage</span></div>
          <div className="panel-body">
            <p style={{ fontSize: "12px", color: "var(--muted)", marginBottom: "10px" }}>One email per line: <code style={{ color: "var(--blue)" }}>Subject|sender@email.com</code></p>
            <textarea className="textarea" value={input} onChange={e => setInput(e.target.value)} rows={4} />
            <button className="btn btn-primary" style={{ marginTop: "10px", width: "100%" }} onClick={triage} disabled={loading}>
              {loading ? <Loading /> : "Triage Emails"}
            </button>
            {results.length > 0 && (
              <div style={{ marginTop: "16px" }}>
                {results.map((r, i) => (
                  <div key={i} style={{ display: "flex", alignItems: "center", gap: "10px", marginBottom: "8px", padding: "8px 12px", background: "var(--card)", borderRadius: "8px", border: "1px solid var(--border)" }}>
                    <span className={"email-chip " + chipClass[r.category]}>{r.category}</span>
                    <div style={{ flex: 1 }}>
                      <div style={{ fontSize: "13px", color: "var(--text)" }}>{r.email.split("|")[0]}</div>
                      <div style={{ fontSize: "11px", color: "var(--muted)" }}>{r.email.split("|")[1]} · {r.reason}</div>
                    </div>
                  </div>
                ))}
              </div>
            )}
          </div>
        </div>
      );
    }

    // ── Morning Briefing Panel ────────────────────────────────────────────────────
    function BriefingPanel({ onToast }) {
      const [briefing, setBriefing] = React.useState(null);
      const [loading, setLoading] = React.useState(false);
      async function getBriefing() {
        setLoading(true);
        try {
          const reply = await callAgent("Give me my morning briefing");
          parseBriefing(reply);
        } catch (e) {
          try {
            const res = await fetch("../context/lmos_data.json");
            const data = await res.json();
            setBriefing({ goal: data.goals[0]?.title + " by " + data.goals[0]?.deadline, surplus: data.finances?.monthly_surplus_pkr?.toLocaleString() + " PKR", habit: data.habits[0]?.name + " — Day " + data.habits[0]?.streak + " of " + data.habits[0]?.target_days, deadlines: "No deadlines today", jobs: "—", raw: null });
          } catch (e2) { setBriefing({ raw: "Could not load briefing." }); }
        }
        setLoading(false);
        onToast("Briefing loaded");
      }
      function parseBriefing(text) {
        const get = (label) => { const m = text.match(new RegExp(label + "[:\\s]+(.+)")); return m ? m[1].trim() : "—"; };
        setBriefing({ goal: get("Top Goal"), surplus: get("Monthly Surplus"), habit: get("Active Habit"), deadlines: get("Deadlines"), jobs: text.match(/(\d+ new jobs|\d+ high-quality)/i)?.[0] || "—", raw: text });
      }
      return (
        <div className="panel">
          <div className="panel-header">
            <span className="panel-title">🌅 Morning Briefing</span>
            <button className="btn btn-primary btn-sm" onClick={getBriefing} disabled={loading}>{loading ? <Loading /> : "Get Briefing"}</button>
          </div>
          <div className="panel-body">
            {!briefing ? <div className="empty"><div className="icon">☀️</div>Click "Get Briefing" to start your day</div> :
              briefing.raw && !briefing.goal ? <div style={{ fontSize: "13px", color: "var(--muted)", whiteSpace: "pre-wrap" }}>{briefing.raw}</div> : (
                <div className="briefing-grid">
                  <div className="briefing-card"><div className="icon">🎯</div><div className="label">Top Goal</div><div className="value" style={{ fontSize: "12px" }}>{briefing.goal}</div></div>
                  <div className="briefing-card"><div className="icon">💰</div><div className="label">Monthly Surplus</div><div className="value">{briefing.surplus}</div></div>
                  <div className="briefing-card"><div className="icon">💪</div><div className="label">Active Habit</div><div className="value" style={{ fontSize: "12px" }}>{briefing.habit}</div></div>
                  <div className="briefing-card"><div className="icon">⏰</div><div className="label">Deadlines</div><div className="value" style={{ fontSize: "12px" }}>{briefing.deadlines}</div></div>
                  {briefing.jobs !== "—" && <div className="briefing-card" style={{ gridColumn: "span 2" }}><div className="icon">💼</div><div className="label">New Jobs</div><div className="value">{briefing.jobs}</div></div>}
                </div>
              )}
          </div>
        </div>
      );
    }

    // ── Proposal Review Panel ─────────────────────────────────────────────────────
    function ProposalPanel({ proposals, onApprove, onToast }) {
      if (proposals.length === 0) return (
        <div className="panel">
          <div className="panel-header"><span className="panel-title">📋 Proposal Review</span></div>
          <div className="panel-body"><div className="empty"><div className="icon">📝</div>No proposals yet. Score a job in the chat to generate one.</div></div>
        </div>
      );
      return (
        <div className="panel">
          <div className="panel-header">
            <span className="panel-title">📋 Proposal Review</span>
            <span style={{ fontSize: "12px", color: "var(--muted)" }}>{proposals.filter(p => p.status === "pending_review").length} pending</span>
          </div>
          <div className="panel-body">
            {proposals.map((p, i) => (
              <div key={i} className={"proposal-card" + (p.status === "approved" ? " approved" : "")}>
                <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: "8px" }}>
                  <div style={{ fontSize: "13px", color: "var(--muted)" }}>Job: {p.job_description?.slice(0, 60)}...</div>
                  <span className={"status-pill status-" + p.status}>{p.status === "pending_review" ? "Pending" : "Approved"}</span>
                </div>
                <div className="proposal-text">{p.proposal}</div>
                {p.status === "pending_review" && (
                  <div className="job-actions">
                    <button className="btn btn-green btn-sm" onClick={() => { onApprove(i); onToast("Proposal approved!"); }}>✓ Approve</button>
                    <button className="btn btn-ghost btn-sm" onClick={() => navigator.clipboard.writeText(p.proposal).then(() => onToast("Copied to clipboard"))}>Copy</button>
                  </div>
                )}
                {p.status === "approved" && <div style={{ fontSize: "12px", color: "var(--green)", marginTop: "8px" }}>✓ Approved — copy and paste manually to Fiverr/Upwork</div>}
              </div>
            ))}
          </div>
        </div>
      );
    }

    // ── App ───────────────────────────────────────────────────────────────────────
    function App() {
      const [tab, setTab] = React.useState("opportunities");
      const [proposals, setProposals] = React.useState([]);
      const [toast, setToast] = React.useState(null);
      const [jobCount, setJobCount] = React.useState(0);
      const [highCount, setHighCount] = React.useState(0);
      const [chatMessages, setChatMessages] = React.useState([
        { role: "agent", text: "Hi Zohaib! I'm AgentZ. Ask me to score a job, fetch opportunities, triage emails, schedule a meeting, or give you a morning briefing." }
      ]);
      const [focusState, setFocusState] = React.useState({
        phase: "setup", topic: "", workMins: 25, pomodoros: 0, totalFocused: 0
      });

      React.useEffect(() => {
        fetch("../dashboard_jobs.json").then(r => r.json()).then(jobs => {
          setJobCount(jobs.length);
          setHighCount(jobs.filter(j => j.score >= 70).length);
        }).catch(() => { });
      }, []);

      function onToast(msg) { setToast(msg); setTimeout(() => setToast(null), 3100); }
      function addProposal(p) { setProposals(prev => [...prev, p]); setTab("proposals"); onToast("New proposal ready for review"); }
      function approveProposal(i) { setProposals(prev => prev.map((p, idx) => idx === i ? { ...p, status: "approved" } : p)); }

      const now = new Date();
      const hour = now.getHours();
      const greeting = hour < 12 ? "Good morning" : hour < 17 ? "Good afternoon" : "Good evening";
      const dateStr = now.toLocaleDateString("en-US", { weekday: "long", month: "long", day: "numeric" });

      const isFocusActive = focusState.phase === "work" || focusState.phase === "break";

      const tabs = [
        { id: "opportunities", label: "🎯 Opportunities" },
        { id: "chat", label: "💬 Chat" },
        { id: "emails", label: "📧 Email Triage" },
        { id: "briefing", label: "🌅 Briefing" },
        { id: "proposals", label: `📋 Proposals ${proposals.filter(p => p.status === "pending_review").length > 0 ? "●" : ""}` },
        { id: "focus", label: `⏱️ Focus${isFocusActive ? " 🔴" : ""}` },
      ];

      return (
        <div>
          <header className="header">
            <div className="header-left">
              <div className="logo">Agent<span>Z</span></div>
              <div className="header-greeting">{greeting}, Zohaib · {dateStr}</div>
            </div>
            <div className="header-stats">
              <div className="stat-chip"><div className="val">{jobCount}</div><div className="lbl">Total Jobs</div></div>
              <div className="stat-chip"><div className="val" style={{ color: "var(--green)" }}>{highCount}</div><div className="lbl">High Match</div></div>
              <div className="stat-chip"><div className="val" style={{ color: "var(--gold)" }}>{proposals.length}</div><div className="lbl">Proposals</div></div>
              {isFocusActive && <div className="stat-chip"><div className="val" style={{ color: "var(--red)" }}>🔴</div><div className="lbl">Focus On</div></div>}
            </div>
          </header>
          <nav className="nav">
            {tabs.map(t => (
              <button key={t.id} className={"nav-tab" + (tab === t.id ? " active" : "") + (t.id === "focus" && isFocusActive ? " focus-active" : "")} onClick={() => setTab(t.id)}>{t.label}</button>
            ))}
          </nav>
          <main className="main">
            {tab === "opportunities" && <OpportunitiesPanel onToast={onToast} />}
            {tab === "chat" && <ChatPanel onProposal={addProposal} messages={chatMessages} setMessages={setChatMessages} />}
            {tab === "emails" && <EmailTriagePanel onToast={onToast} />}
            {tab === "briefing" && <BriefingPanel onToast={onToast} />}
            {tab === "proposals" && <ProposalPanel proposals={proposals} onApprove={approveProposal} onToast={onToast} />}
            {tab === "focus" && <FocusMode focusState={focusState} setFocusState={setFocusState} setTab={setTab} />}
          </main>
          {toast && <Toast msg={toast} onClose={() => setToast(null)} />}
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>

</html>
